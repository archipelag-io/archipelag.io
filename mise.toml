[tools]
zola = "0.22.1"

[tasks.build]
description = "Build site for production"
run = "zola build"

[tasks.dev]
description = "Start dev server with live reload"
run = "zola serve --open"
raw = true

[tasks.check]
description = "Check site without building"
run = "zola check"

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf public"

[tasks."og:install"]
description = "Install OG image generator dependencies"
run = """
#!/bin/bash
set -e
cd scripts/og-images
npm install
npx playwright install chromium
"""

[tasks."og:generate"]
description = "Regenerate per-post OG images into static/og/"
run = """
#!/bin/bash
set -e
cd scripts/og-images
node generate.js
"""

[tasks.deploy]
description = "Build and deploy (Cloudflare Pages auto-deploys on push)"
run = """
#!/bin/bash
set -e
echo "Building site..."
zola build
echo "Site built. Push to main to deploy via Cloudflare Pages."
"""
